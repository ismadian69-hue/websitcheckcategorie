<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Domain Checker PRO</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  color: #e2e8f0;
  padding: 30px;
}

h1 { text-align:center; }

textarea {
  width:100%;
  height:140px;
  border-radius:12px;
  padding:15px;
  background:#020617;
  color:white;
  border:1px solid #334155;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
  font-weight:bold;
  background:#3b82f6;
  color:white;
}

input {
  margin-top:15px;
  padding:10px;
  border-radius:10px;
  border:none;
  width:250px;
}

.table-container {
  margin-top:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:15px;
  overflow:hidden;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:12px;
}

th {
  background:#020617;
  color:#94a3b8;
}

.success { color:#22c55e; }
.error { color:#ef4444; }

.domain { color:#38bdf8; font-family:monospace; }

.badge {
  background:#1e293b;
  padding:4px 8px;
  border-radius:6px;
}
</style>

</head>

<body>

<h1>🌐 Domain Checker PRO</h1>

<textarea id="domains" placeholder="example.com&#10;google.com"></textarea><br>

<button onclick="start()">Check</button>

<br>
<input id="search" placeholder="Search..." onkeyup="filterTable()">

<div class="table-container">
<table>
<thead>
<tr>
<th>Domain</th>
<th>Status</th>
<th>Category</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>
</div>

<script>
let resultsData = [];

function parseDomains() {
  let raw = document.getElementById("domains").value;
  return raw.split(/[\n,]+/).map(d => d.trim()).filter(d => d);
}

async function checkDomain(domain) {
  try {
    let res = await fetch(`/api/check?domain=${domain}`);
    let d = await res.json();

    return {
      domain,
      status: "Success",
      category: d.category || "-"
    };
  } catch {
    return { domain, status: "Error" };
  }
}

async function start() {
  let domains = parseDomains();
  let table = document.getElementById("results");

  table.innerHTML = "";
  resultsData = [];

  await Promise.all(
    domains.map(async (domain) => {
      let data = await checkDomain(domain);
      resultsData.push(data);
      table.innerHTML += rowHTML(data);
    })
  );
}

function rowHTML(d) {
  return `
  <tr>
    <td class="domain">${d.domain}</td>
    <td class="${d.status=='Success'?'success':'error'}">${d.status}</td>
    <td><span class="badge">${d.category}</span></td>
  </tr>`;
}

function filterTable() {
  let q = document.getElementById("search").value.toLowerCase();
  let rows = document.querySelectorAll("#results tr");

  rows.forEach((row, i) => {
    let d = resultsData[i];
    let text = `${d.domain} ${d.category}`.toLowerCase();
    row.style.display = text.includes(q) ? "" : "none";
  });
}
</script>

</body>
</html>
